<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TithiDarshan | Divine Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="glass-card" style="margin: 15px; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 15px; z-index: 100;">
        <h1 class="cinzel" style="color: var(--saffron);">TithiDarshan</h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <i data-lucide="search"></i>
            <i data-lucide="moon" onclick="document.body.classList.toggle('dark-mode')"></i>
            <i data-lucide="menu"></i>
        </div>
    </nav>

    <main style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 class="cinzel" style="font-size: 2rem;">માર્ચ ૨૦૨૪</h2>
            <p>વિક્રમ સંવત ૨૦૮૦ | પોષ - મહા</p>
        </div>

        <div class="calendar-grid" id="mainGrid">
            </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        lucide.createIcons();
        const grid = document.getElementById('mainGrid');
        
        // કેલેન્ડર જનરેટ કરવાનો કોડ
        for(let i=1; i<=31; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            // ઉદાહરણ માટે વ્રજ અને ગુર્જર તિથિઓ
            let gT = "દશમી";
            let vT = (i === 11) ? "એકાદશી" : "દશમી"; 

            cell.innerHTML = `
                <span class="date-num">${i}</span>
                <div class="tithi-item g-tithi">G: ${gT}</div>
                <div class="tithi-item v-tithi">V: ${vT}</div>
                ${i === 11 ? '<div class="fest-tag">પુત્રદા એકાદશી</div>' : ''}
            `;
            cell.onclick = () => window.location.href = 'tithidata.html';
            grid.appendChild(cell);
        }

        // Footer Load
        fetch('footer.html').then(res => res.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
