<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TithiDarshan | Divine Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="glass" style="margin: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
        <h1 class="cinzel" style="color: var(--saffron);">TithiDarshan</h1>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-saffron">Today</button>
            <i data-lucide="menu" style="cursor: pointer;"></i>
        </div>
    </nav>

    <main style="max-width: 1200px; margin: 0 auto; padding: 10px;">
        <div class="glass" style="margin-bottom: 20px; padding: 20px; text-align: center;">
            <h2 class="cinzel" id="monthName">May 2026</h2>
        </div>

        <div class="calendar-grid glass" id="grid"></div>
    </main>

    <script>
        // ડેટા એડિટ કરવા માટે અહીં ફેરફાર કરો
        const tithiData = {
            7: { g: "એકાદશી", v: "મોહિની એકાદશી", fest: "Mohini Ekadashi", color: "gold" },
            15: { g: "અમાસ", v: "અમાસ", fest: "Darsh Amavasya" }
        };

        const grid = document.getElementById('grid');
        for (let i = 1; i <= 31; i++) {
            const dayData = tithiData[i] || { g: `તિથિ ${i}`, v: `તિથિ ${i}` };
            const cell = document.createElement('div');
            cell.className = `day-cell glass ${dayData.color ? 'ekadashi-glow' : ''}`;
            cell.innerHTML = `
                <div class="date-num">${i}</div>
                <div class="tithi-group">
                    <div class="t-badge g-style"><span class="tithi-tag">G:</span> ${dayData.g}</div>
                    <div class="t-badge v-style"><span class="tithi-tag">V:</span> ${dayData.v}</div>
                </div>
                ${dayData.fest ? `<div class="fest-tag">${dayData.fest}</div>` : ''}
            `;
            cell.onclick = () => window.location.href = `tithidata.html?day=${i}`;
            grid.appendChild(cell);
        }
        lucide.createIcons();
    </script>
</body>
</html>
